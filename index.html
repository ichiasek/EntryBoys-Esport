<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ICHIAK Esports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Rajdhani,sans-serif;background:#0b0d12;color:#fff;overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(255,70,85,.2),transparent 35%),
radial-gradient(circle at 80% 70%,rgba(255,70,85,.15),transparent 30%),
linear-gradient(#0b0d12,#111722);z-index:-2}
body:after{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px;z-index:-1}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:18px 60px;background:rgba(10,10,15,.75);backdrop-filter:blur(12px);border-bottom:1px solid #ff4655;z-index:9}
.logo{font-size:28px;font-weight:700;color:#ff4655}
nav a{color:#fff;text-decoration:none;margin-left:28px}
nav a:hover{color:#ff4655}
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:90px;text-shadow:0 0 20px #ff4655}
.hero p{font-size:24px;color:#ddd}
button{margin-top:30px;padding:16px 40px;border:0;background:#ff4655;color:#fff;font-weight:700;border-radius:10px;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-5px);box-shadow:0 0 30px #ff4655}
.section{max-width:1100px;margin:auto;padding:90px 25px}
h2{font-size:46px;color:#ff4655;margin-bottom:20px}
.card{margin-top:25px;padding:28px;border:1px solid rgba(255,70,85,.4);background:rgba(18,21,29,.8);backdrop-filter:blur(8px);border-radius:18px;transition:.3s}
.card:hover{transform:translateY(-8px);box-shadow:0 0 35px rgba(255,70,85,.5)}
footer{text-align:center;padding:35px;color:#888;border-top:1px solid #333}
</style>
</head>
<body>
<nav><div class="logo">MAIN PAGE</div><div>
<a href="#home">Home</a><a href="#join">Join</a><a href="#roster">Roster</a>
</div></nav>

<section id="home" class="hero">
<h1>EntryBoys ESPORT</h1>
<p>Valorant Competitive Team</p>
<a href="https://forms.gle/oQ7KkyZRSSziot8C6" target="_blank"><button>JOIN TEAM</button></a>
</section>

<section id="join" class="section">
<h2>Join us</h2>
<p>Klikni a vyplň přihlášku:</p>
<a href="https://forms.gle/oQ7KkyZRSSziot8C6" target="_blank"><button>OPEN APPLICATION</button></a>
</section>

<section id="roster" class="section">
<h2>Roster</h2>
<div class="card">
<h3 style="font-size:34px">IQ Feynx</h3>
<p style="font-size:22px;color:#ccc">Founder & Captain</p>
</div>
</section>

<footer>EntryBoys ESPORT © 2026</footer>
</body></html>
